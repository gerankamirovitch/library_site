{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4"><i class="fas fa-user-plus me-2"></i>Регистрация</h2>
                <form method="post">
                    <div class="mb-3">
                        <label for="login" class="form-label">Логин *</label>
                        <input type="text" class="form-control" id="login" name="login" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль *</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Роль</label>
                        <select class="form-select" id="role" name="role">
                            <option value="reader">Читатель</option>
                            <option value="librarian">Библиотекарь</option>
                            <option value="admin">Администратор</option>
                        </select>
                    </div>
                    <hr class="my-3">
                    <h5>Данные читателя (если роль "Читатель")</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="text" class="form-control" name="last_name" placeholder="Фамилия">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input type="text" class="form-control" name="first_name" placeholder="Имя">
                        </div>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" name="patronymic" placeholder="Отчество">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" name="library_card" placeholder="Номер читательского билета">
                    </div>
                    <div class="mb-3">
                        <input type="tel" class="form-control" name="phone" placeholder="Телефон">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" name="email" placeholder="Email">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                </form>
                <p class="mt-3 text-center">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войдите</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
